project_name: hot_spring_phase1
results_root: results

prefilter:
  min_length: 80
  max_length: 1200
  max_single_residue_fraction: 0.7

cluster:
  mmseqs_bin: mmseqs
  min_seq_id: 0.9
  coverage: 0.8
  threads: 64

thermo:
  temstapro_bin: temstapro
  model_dir: /models/temstapro/ProtTrans
  cache_dir: /tmp/temstapro_cache
  top_fraction: 0.1
  min_score: 0.5

protrek:
  python_bin: /opt/protrek/bin/python
  repo_root: /srv/ProTrek
  weights_dir: /srv/ProTrek/weights/ProTrek_650M
  query_texts:
    - thermostable enzyme
    - heat-stable protein
  batch_size: 8
  top_k: 50

foldseek:
  base_url: http://127.0.0.1:8100
  database: afdb50
  topk: 5
  min_tmscore: 0.6
